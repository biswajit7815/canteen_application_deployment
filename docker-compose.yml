version: '3.8'

services:

  # ----------------- MongoDB -----------------
  mongo:
    image: mongo:6.0
    container_name: mca_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: mca_db
    volumes:
      - mongo_data:/data/db
    networks:
      - mca_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------- Backend -----------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mca_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: # mongo uri
      CLOUDINARY_KEY: " # CLOUDINARY_KEY "
      CLOUDINARY_NAME: "# CLOUDINARY_NAME "
      CLOUDINARY_SECRET: "# CLOUDINARY_SECRET"
      COOKIE_EXPIRE: 7
      JWT_EXPIRE: 7d
      JWT_SECRET: # your gmail id
      SMTP_HOST: smtp.gmail.com
      SMTP_PASSWORD: "#  SMTP_PASSWORD"
      SMTP_PORT: 465
      SMTP_SERVICE: gmail
      SMTP_USER: mycanteen.in@gmail.com
      STRIPE_SECRET: # siripe secret
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - mca_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------- Frontend -----------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mca_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mca_network

  # ----------------- Admin -----------------
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: mca_admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mca_network

# ----------------- Volumes -----------------
volumes:
  mongo_data:
    name: mca_mongo_data

# ----------------- Networks -----------------
networks:
  mca_network:
    driver: bridge
